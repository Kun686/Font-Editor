<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TTF 字体转换工具</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="tool-panel" aria-labelledby="page-title">
        <div class="heading">
          <p class="eyebrow">Server-side TTF Converter</p>
          <h1 id="page-title">TTF 字体转换工具</h1>
          <p class="summary">
            上传字体后在服务器内存中处理，支持缩放、Thin、Bold、排版间距和 A/B 字体字符替换。
          </p>

          <div class="preview-panel" aria-label="当前字符效果">
            <label class="field">
              <span>预览文本</span>
              <textarea id="preview-text" rows="3">0123456789 ABCXYZ abcxyz +-*/.,</textarea>
            </label>
            <div id="preview-output" class="preview-output">0123456789 ABCXYZ abcxyz +-*/.,</div>
          </div>
        </div>

        <form id="converter-form" class="converter-form">
          <label class="file-drop">
            <input id="font-file" name="font_file" type="file" accept=".ttf,font/ttf" required />
            <span class="file-drop-title">选择 B 目标字体 .ttf</span>
            <span id="file-meta" class="file-drop-meta">输出会以 B 字体为基础</span>
          </label>

          <label class="file-drop compact-drop">
            <input id="source-font-file" name="source_font_file" type="file" accept=".ttf,font/ttf" />
            <span class="file-drop-title">选择 A 来源字体 .ttf</span>
            <span id="source-file-meta" class="file-drop-meta">可选，用 A 的字符替换到 B</span>
          </label>

          <div class="control-grid">
            <label class="field">
              <span>缩放比例 (%)</span>
              <input
                id="scale-percent"
                name="scale_percent"
                type="number"
                min="10"
                max="300"
                step="1"
                value="100"
                inputmode="numeric"
              />
            </label>

            <label class="range-field">
              <span>快速调整</span>
              <input id="scale-range" type="range" min="10" max="300" step="1" value="100" />
            </label>
          </div>

          <fieldset class="mode-group">
            <legend>字形转换</legend>
            <label>
              <input type="radio" name="weight_mode" value="none" checked />
              <span>不处理</span>
            </label>
            <label>
              <input type="radio" name="weight_mode" value="thin" />
              <span>Thin 变细</span>
            </label>
            <label>
              <input type="radio" name="weight_mode" value="bold" />
              <span>Bold 加粗</span>
            </label>
          </fieldset>

          <div class="effect-grid">
            <label class="field">
              <span>水平效果 (字体单位)</span>
              <input
                id="effect-x"
                name="effect_x_units"
                type="number"
                min="-500"
                max="500"
                step="1"
                value="0"
                inputmode="decimal"
              />
            </label>

            <label class="field">
              <span>垂直效果 (字体单位)</span>
              <input
                id="effect-y"
                name="effect_y_units"
                type="number"
                min="-500"
                max="500"
                step="1"
                value="0"
                inputmode="decimal"
              />
            </label>
          </div>

          <fieldset class="replacement-panel">
            <legend>A → B 字符替换</legend>
            <div class="replacement-grid">
              <label class="field">
                <span>替换范围</span>
                <select id="replacement-scope" name="replacement_scope">
                  <option value="digits">仅数字 0-9</option>
                  <option value="uppercase">仅大写字母 A-Z</option>
                  <option value="lowercase">仅小写字母 a-z</option>
                  <option value="letters">大小写字母 A-Z a-z</option>
                  <option value="digits_letters">数字和字母</option>
                  <option value="custom">仅自定义字符</option>
                </select>
              </label>

              <label class="field">
                <span>追加自定义字符</span>
                <input
                  id="custom-replacement-chars"
                  name="custom_replacement_chars"
                  type="text"
                  value=""
                  placeholder="+-*/.,"
                  autocomplete="off"
                />
              </label>
            </div>
          </fieldset>

          <fieldset class="spacing-panel">
            <legend>排版间距 (%)</legend>
            <div class="spacing-grid">
              <label class="field">
                <span>左间距</span>
                <input
                  id="spacing-left"
                  name="spacing_left_percent"
                  type="number"
                  min="-50"
                  max="50"
                  step="0.1"
                  value="0"
                  inputmode="decimal"
                />
              </label>

              <label class="field">
                <span>右间距</span>
                <input
                  id="spacing-right"
                  name="spacing_right_percent"
                  type="number"
                  min="-50"
                  max="50"
                  step="0.1"
                  value="0"
                  inputmode="decimal"
                />
              </label>

              <label class="field">
                <span>上间距</span>
                <input
                  id="spacing-top"
                  name="spacing_top_percent"
                  type="number"
                  min="-50"
                  max="50"
                  step="0.1"
                  value="0"
                  inputmode="decimal"
                />
              </label>

              <label class="field">
                <span>下间距</span>
                <input
                  id="spacing-bottom"
                  name="spacing_bottom_percent"
                  type="number"
                  min="-50"
                  max="50"
                  step="0.1"
                  value="0"
                  inputmode="decimal"
                />
              </label>
            </div>
          </fieldset>

          <div class="progress-panel" aria-label="转换进度">
            <div class="progress-header">
              <span id="progress-label">等待开始</span>
              <output id="progress-percent" for="progress-bar">0%</output>
            </div>
            <progress id="progress-bar" class="progress-bar" max="100" value="0"></progress>
          </div>

          <div class="actions">
            <button id="submit-button" type="submit">开始转换</button>
            <a id="download-link" class="download-link" href="#" download hidden>下载转换后的字体</a>
            <p id="status" class="status" role="status">等待上传字体</p>
          </div>

          <p id="error-message" class="error-message" role="alert" hidden></p>
        </form>
      </section>

      <section class="notice" aria-label="处理说明">
        <strong>处理说明</strong>
        <span>文件会上传到服务器进行高兼容转换，但应用不会永久保存上传文件或转换结果。</span>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
